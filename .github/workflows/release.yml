name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 90
    env:
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
      SPARKLE_PUBLIC_ED_KEY: ${{ vars.SPARKLE_PUBLIC_ED_KEY }}
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode 16.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Install build tools
        run: brew install xcodegen create-dmg yq

      - name: Verify tag matches MARKETING_VERSION
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PLIST_VERSION=$(yq '.settings.base.MARKETING_VERSION' project.yml | tr -d '"')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$PLIST_VERSION" != "$TAG_VERSION" ]]; then
            echo "::error::project.yml MARKETING_VERSION ($PLIST_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Import Developer ID certificate
        run: |
          set -euo pipefail
          if [[ -z "${BUILD_CERTIFICATE_BASE64:-}" ]]; then
            echo "==> No BUILD_CERTIFICATE_BASE64 secret set, skipping (dry run)"
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_PATH" -k "$KEYCHAIN" \
            -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security

          # Make our temp keychain the default search path so xcodebuild finds the cert.
          OTHER=$(security list-keychains -d user | sed 's/[" ]//g')
          security list-keychains -d user -s "$KEYCHAIN" $OTHER

          # Required so codesign can use the imported key without a GUI prompt.
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null

          echo "BUILD_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"
          echo "DEVELOPMENT_TEAM=$APPLE_TEAM_ID" >> "$GITHUB_ENV"

      - name: Build Release
        env:
          CURRENT_PROJECT_VERSION: ${{ github.run_number }}
        run: scripts/build-release.sh

      - name: Make DMG
        run: scripts/make-dmg.sh

      - name: Notarize DMG
        run: scripts/notarize.sh

      - name: Sign Sparkle appcast
        run: scripts/sign-appcast.sh

      - name: Read built version
        id: version
        run: |
          V=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" \
              build/export/Klang.app/Contents/Info.plist)
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts (workflow_dispatch dry run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: klang-dmg-${{ steps.version.outputs.version }}
          path: |
            build/Klang.dmg
            build/Klang-*.dmg
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/Klang.dmg
            build/Klang-${{ steps.version.outputs.version }}.dmg
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Commit updated appcast.xml
        if: startsWith(github.ref, 'refs/tags/v') && env.SPARKLE_ED_PRIVATE_KEY != ''
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git pull --ff-only origin main
          if git diff --quiet -- docs/appcast.xml; then
            echo "appcast.xml unchanged"
            exit 0
          fi
          git add docs/appcast.xml
          git commit -m "chore: update appcast for v${{ steps.version.outputs.version }}"
          git push origin main

      - name: Clean up keychain
        if: always() && env.BUILD_KEYCHAIN != ''
        run: security delete-keychain "$BUILD_KEYCHAIN" || true
