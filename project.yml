name: Klang
options:
  bundleIdPrefix: se.linus
  deploymentTarget:
    macOS: "14.2"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
targets:
  Klang:
    type: application
    platform: macOS
    deploymentTarget: "14.2"
    sources:
      - path: Klang
        excludes:
          - "Info.plist"
          - "Klang.entitlements"
    info:
      path: Klang/Info.plist
      properties:
        CFBundleName: Klang
        CFBundleDisplayName: Klang
        CFBundleIdentifier: se.linus.klang
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundlePackageType: APPL
        LSUIElement: true
        LSMinimumSystemVersion: "14.2"
        NSAudioCaptureUsageDescription: "Klang captures system audio via a Core Audio process tap so it can apply EQ before routing audio to your output device."
        NSHighResolutionCapable: true
        NSUbiquitousContainers:
          iCloud.se.linus.klang:
            NSUbiquitousContainerIsDocumentScopePublic: true
            NSUbiquitousContainerSupportedFolderLevels: Any
            NSUbiquitousContainerName: Klang
    entitlements:
      path: Klang/Klang.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.audio-input: true
        # iCloud Drive sync needs the three entitlement keys below. They're
        # commented out so ad-hoc dev builds (./scripts/dev.sh with no
        # DEVELOPMENT_TEAM) succeed — codesign rejects iCloud entitlements
        # without a development certificate. Uncomment once you've set a
        # DEVELOPMENT_TEAM and registered the iCloud.se.linus.klang container
        # in developer.apple.com. With them off, the Settings → Sync toggle
        # shows "iCloud Drive isn't available" and presets stay local.
        # com.apple.developer.icloud-services:
        #   - CloudDocuments
        # com.apple.developer.icloud-container-identifiers:
        #   - iCloud.se.linus.klang
        # com.apple.developer.ubiquity-container-identifiers:
        #   - iCloud.se.linus.klang
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: se.linus.klang
        PRODUCT_NAME: Klang
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Klang/Info.plist
        CODE_SIGN_ENTITLEMENTS: Klang/Klang.entitlements
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_HARDENED_RUNTIME: YES
