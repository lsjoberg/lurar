name: Lurar
options:
  bundleIdPrefix: app.lurar
  deploymentTarget:
    macOS: "14.2"
  createIntermediateGroups: true
  generateEmptyDirectories: true
configs:
  Debug: debug
  Release: release
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
settings:
  base:
    MARKETING_VERSION: "0.8.0" # x-release-please-version
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    SPARKLE_PUBLIC_ED_KEY: ""
  configs:
    Debug:
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: "-"
      DEVELOPMENT_TEAM: ""
    Release:
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: "Developer ID Application"
      OTHER_CODE_SIGN_FLAGS: "--timestamp --options runtime"
targets:
  Lurar:
    type: application
    platform: macOS
    deploymentTarget: "14.2"
    sources:
      - path: Lurar
        excludes:
          - "Info.plist"
          - "Lurar.entitlements"
    dependencies:
      - package: Sparkle
    info:
      path: Lurar/Info.plist
      properties:
        CFBundleName: Lurar
        CFBundleDisplayName: Lurar
        CFBundleIdentifier: app.lurar.Lurar
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundlePackageType: APPL
        CFBundleIconName: AppIcon
        LSUIElement: true
        LSMinimumSystemVersion: "14.2"
        LSApplicationCategoryType: "public.app-category.music"
        NSAudioCaptureUsageDescription: "Lurar captures system audio via a Core Audio process tap so it can apply EQ before routing audio to your output device."
        NSHighResolutionCapable: true
        NSUbiquitousContainers:
          iCloud.app.lurar.Lurar:
            NSUbiquitousContainerIsDocumentScopePublic: true
            NSUbiquitousContainerSupportedFolderLevels: Any
            NSUbiquitousContainerName: Lurar
        SUFeedURL: "https://lurar.app/appcast.xml"
        SUPublicEDKey: "$(SPARKLE_PUBLIC_ED_KEY)"
    entitlements:
      path: Lurar/Lurar.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.audio-input: true
        # iCloud Drive sync needs the three entitlement keys below. They're
        # commented out so ad-hoc dev builds (./scripts/dev.sh with no
        # DEVELOPMENT_TEAM) succeed — codesign rejects iCloud entitlements
        # without a development certificate. Uncomment once you've set a
        # DEVELOPMENT_TEAM and registered the iCloud.app.lurar.Lurar container
        # in developer.apple.com. With them off, the Settings → Sync toggle
        # shows "iCloud Drive isn't available" and presets stay local.
        # com.apple.developer.icloud-services:
        #   - CloudDocuments
        # com.apple.developer.icloud-container-identifiers:
        #   - iCloud.app.lurar.Lurar
        # com.apple.developer.ubiquity-container-identifiers:
        #   - iCloud.app.lurar.Lurar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.lurar.Lurar
        PRODUCT_NAME: Lurar
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Lurar/Info.plist
        CODE_SIGN_ENTITLEMENTS: Lurar/Lurar.entitlements
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
