<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="Screenshot placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f4f4"/>
      <stop offset="1" stop-color="#e7e7e7"/>
    </linearGradient>
    <linearGradient id="bgDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1a1a"/>
      <stop offset="1" stop-color="#101010"/>
    </linearGradient>
    <style>
      .bg-fill { fill: url(#bg); }
      .stroke  { stroke: rgba(0,0,0,0.10); }
      .label   { fill: rgba(0,0,0,0.55); }
      .sub     { fill: rgba(0,0,0,0.35); }
      .curve   { stroke: rgba(0,0,0,0.35); }
      @media (prefers-color-scheme: dark) {
        .bg-fill { fill: url(#bgDark); }
        .stroke  { stroke: rgba(255,255,255,0.10); }
        .label   { fill: rgba(255,255,255,0.55); }
        .sub     { fill: rgba(255,255,255,0.35); }
        .curve   { stroke: rgba(255,255,255,0.35); }
      }
    </style>
  </defs>

  <!-- rounded window body -->
  <rect class="bg-fill stroke" x="20" y="20" width="1560" height="960" rx="28" ry="28" stroke-width="1"/>

  <!-- traffic-light dots -->
  <circle cx="68"  cy="62" r="8" fill="#ff5f57"/>
  <circle cx="96"  cy="62" r="8" fill="#febc2e"/>
  <circle cx="124" cy="62" r="8" fill="#28c840"/>

  <!-- title bar separator -->
  <line class="stroke" x1="20" y1="104" x2="1580" y2="104" stroke-width="1"/>

  <!-- decorative eq curve -->
  <path class="curve" fill="none" stroke-width="2.5"
        d="M 120 620
           C 260 620, 320 540, 440 540
           S 620 700, 760 660
           S 940 480, 1080 520
           S 1280 600, 1480 580"/>

  <!-- centered label -->
  <text x="800" y="500" text-anchor="middle"
        font-family="-apple-system, system-ui, sans-serif"
        font-size="34" font-weight="600" class="label">
    Screenshot coming soon
  </text>
  <text x="800" y="544" text-anchor="middle"
        font-family="-apple-system, system-ui, sans-serif"
        font-size="18" class="sub">
    Capture with: scripts/screenshot.sh &lt;name&gt;
  </text>
</svg>
