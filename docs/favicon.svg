<!-- Size- and color-scheme-aware favicon.
     • Full color mark with face at ≥ 28 px viewports (retina tab bars, pinned tabs, iOS home screen).
     • Face elements auto-hide below 28 px (legacy 16-px tab bars) so the silhouette stays sharp.
     • Dark-mode palette swaps via prefers-color-scheme. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .bg    { fill: #0d7a6e; }
    .cup   { fill: #fafafa; }
    .band  { fill: none; stroke: #fafafa; }
    .eye   { fill: #ff7a59; }
    .wink,
    .mouth { fill: none; stroke: #ff7a59; }

    @media (max-width: 28px) {
      .eye, .wink, .mouth { display: none; }
    }

    @media (prefers-color-scheme: dark) {
      .bg    { fill: #3dd6c2; }
      .cup   { fill: #0a0a0a; }
      .band  { stroke: #0a0a0a; }
      .eye   { fill: #ff9272; }
      .wink,
      .mouth { stroke: #ff9272; }
    }
  </style>

  <rect class="bg" width="100" height="100" rx="22"/>

  <path  class="band" d="M 16 52 Q 50 10, 84 52" stroke-width="6.5" stroke-linecap="round"/>
  <circle class="cup"  cx="16" cy="60" r="13"/>
  <circle class="cup"  cx="84" cy="60" r="13"/>

  <circle class="eye"   cx="40" cy="58" r="5"/>
  <path  class="wink"  d="M 54 60 Q 60 52, 66 60" stroke-width="5" stroke-linecap="round"/>
  <path  class="mouth" d="M 43 75 Q 50 77, 57 70" stroke-width="5" stroke-linecap="round"/>
</svg>
