<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1500" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Helvetica, Arial, sans-serif">
  <rect width="1000" height="1500" fill="#fafafa"/>

  <!-- Title -->
  <text x="60" y="60" font-size="28" font-weight="700" fill="#0a0a0a" letter-spacing="-0.02em">Lurar — Wink, iteration</text>
  <text x="60" y="86" font-size="14" fill="#666">Eyes moved between the earcups so the cans read as cans and the face reads as face. Wink is now an unambiguous closed-eye arc. Three mouth options below.</text>
  <line x1="60" y1="108" x2="940" y2="108" stroke="#0a0a0a" stroke-opacity="0.08"/>

  <!-- =========================================================
       HERO — refined Wink (default mouth: small smile)
       Mark coords (in 100x100):
         headband:  M 16 52 Q 50 10, 84 52   sw=6.5
         L cup:     cx=16 cy=60 r=13
         R cup:     cx=84 cy=60 r=13
         open eye:  cx=40 cy=58 r=5
         wink:      M 54 60 Q 60 52, 66 60   sw=3.5
         mouth:     M 43 73 Q 50 79, 57 73   sw=3.5
       ========================================================= -->
  <g transform="translate(0, 140)">
    <text x="60" y="0" font-size="11" font-weight="700" fill="#999" letter-spacing="0.16em">REFINED MARK</text>

    <!-- Light -->
    <rect x="60" y="20" width="300" height="300" rx="24" fill="#ffffff" stroke="#0a0a0a" stroke-opacity="0.08"/>
    <g transform="translate(110, 70) scale(2.0)">
      <path d="M 16 52 Q 50 10, 84 52" fill="none" stroke="#0d7a6e" stroke-width="6.5" stroke-linecap="round"/>
      <circle cx="16" cy="60" r="13" fill="#0d7a6e"/>
      <circle cx="84" cy="60" r="13" fill="#0d7a6e"/>
      <circle cx="40" cy="58" r="5" fill="#ff7a59"/>
      <path d="M 54 60 Q 60 52, 66 60" fill="none" stroke="#ff7a59" stroke-width="3.5" stroke-linecap="round"/>
      <path d="M 43 73 Q 50 79, 57 73" fill="none" stroke="#ff7a59" stroke-width="3.5" stroke-linecap="round"/>
    </g>

    <!-- Dark -->
    <rect x="380" y="20" width="300" height="300" rx="24" fill="#0a0a0a"/>
    <g transform="translate(430, 70) scale(2.0)">
      <path d="M 16 52 Q 50 10, 84 52" fill="none" stroke="#3dd6c2" stroke-width="6.5" stroke-linecap="round"/>
      <circle cx="16" cy="60" r="13" fill="#3dd6c2"/>
      <circle cx="84" cy="60" r="13" fill="#3dd6c2"/>
      <circle cx="40" cy="58" r="5" fill="#ff9272"/>
      <path d="M 54 60 Q 60 52, 66 60" fill="none" stroke="#ff9272" stroke-width="3.5" stroke-linecap="round"/>
      <path d="M 43 73 Q 50 79, 57 73" fill="none" stroke="#ff9272" stroke-width="3.5" stroke-linecap="round"/>
    </g>

    <!-- Anatomy callouts -->
    <g font-size="12" fill="#666">
      <text x="710" y="50" font-size="11" font-weight="700" fill="#999" letter-spacing="0.16em">ANATOMY</text>
      <circle cx="715" cy="84" r="5" fill="#0d7a6e"/>
      <text x="730" y="88">Earcups + headband — kept in turquoise</text>
      <circle cx="715" cy="114" r="5" fill="#ff7a59"/>
      <text x="730" y="118">Face features — coral accent (new)</text>
      <text x="710" y="158" font-size="11" font-weight="700" fill="#999" letter-spacing="0.16em">CHANGES vs v1</text>
      <text x="710" y="184">• Eyes moved between cups (was: in cups)</text>
      <text x="710" y="206">• Wink is now a clear arc ‟︶”</text>
      <text x="710" y="228">• Open eye enlarged for legibility</text>
      <text x="710" y="250">• Mouth added (3 options below)</text>
      <text x="710" y="272">• Headband arch raised slightly</text>
    </g>
  </g>

  <!-- =========================================================
       MOUTH OPTIONS — 3 variants side-by-side
       ========================================================= -->
  <g transform="translate(0, 510)">
    <text x="60" y="0" font-size="11" font-weight="700" fill="#999" letter-spacing="0.16em">MOUTH OPTIONS</text>
    <text x="60" y="22" font-size="14" fill="#666">Pick one — or none — to lock the personality.</text>

    <!-- A: small smile (default) -->
    <rect x="60" y="40" width="220" height="220" rx="20" fill="#ffffff" stroke="#0a0a0a" stroke-opacity="0.08"/>
    <g transform="translate(95, 75) scale(1.5)">
      <path d="M 16 52 Q 50 10, 84 52" fill="none" stroke="#0d7a6e" stroke-width="6.5" stroke-linecap="round"/>
      <circle cx="16" cy="60" r="13" fill="#0d7a6e"/>
      <circle cx="84" cy="60" r="13" fill="#0d7a6e"/>
      <circle cx="40" cy="58" r="5" fill="#ff7a59"/>
      <path d="M 54 60 Q 60 52, 66 60" fill="none" stroke="#ff7a59" stroke-width="3.5" stroke-linecap="round"/>
      <path d="M 43 73 Q 50 79, 57 73" fill="none" stroke="#ff7a59" stroke-width="3.5" stroke-linecap="round"/>
    </g>
    <text x="80" y="282" font-size="13" font-weight="700" fill="#0a0a0a">A — Small smile</text>
    <text x="80" y="300" font-size="12" fill="#666">Symmetric, friendly. Approachable.</text>

    <!-- B: sly smirk (asymmetric) -->
    <rect x="300" y="40" width="220" height="220" rx="20" fill="#ffffff" stroke="#0a0a0a" stroke-opacity="0.08"/>
    <g transform="translate(335, 75) scale(1.5)">
      <path d="M 16 52 Q 50 10, 84 52" fill="none" stroke="#0d7a6e" stroke-width="6.5" stroke-linecap="round"/>
      <circle cx="16" cy="60" r="13" fill="#0d7a6e"/>
      <circle cx="84" cy="60" r="13" fill="#0d7a6e"/>
      <circle cx="40" cy="58" r="5" fill="#ff7a59"/>
      <path d="M 54 60 Q 60 52, 66 60" fill="none" stroke="#ff7a59" stroke-width="3.5" stroke-linecap="round"/>
      <path d="M 43 75 Q 50 77, 57 70" fill="none" stroke="#ff7a59" stroke-width="3.5" stroke-linecap="round"/>
    </g>
    <text x="320" y="282" font-size="13" font-weight="700" fill="#0a0a0a">B — Sly smirk</text>
    <text x="320" y="300" font-size="12" fill="#666">Right corner up — knowing, mischievous. Most "lurar."</text>

    <!-- C: no mouth -->
    <rect x="540" y="40" width="220" height="220" rx="20" fill="#ffffff" stroke="#0a0a0a" stroke-opacity="0.08"/>
    <g transform="translate(575, 75) scale(1.5)">
      <path d="M 16 52 Q 50 10, 84 52" fill="none" stroke="#0d7a6e" stroke-width="6.5" stroke-linecap="round"/>
      <circle cx="16" cy="60" r="13" fill="#0d7a6e"/>
      <circle cx="84" cy="60" r="13" fill="#0d7a6e"/>
      <circle cx="40" cy="58" r="5" fill="#ff7a59"/>
      <path d="M 54 60 Q 60 52, 66 60" fill="none" stroke="#ff7a59" stroke-width="3.5" stroke-linecap="round"/>
    </g>
    <text x="560" y="282" font-size="13" font-weight="700" fill="#0a0a0a">C — No mouth</text>
    <text x="560" y="300" font-size="12" fill="#666">Cleanest. Personality lives entirely in the wink.</text>
  </g>

  <!-- =========================================================
       SIZE TESTS
       ========================================================= -->
  <g transform="translate(0, 880)">
    <text x="60" y="0" font-size="11" font-weight="700" fill="#999" letter-spacing="0.16em">SIZE TEST — default (option A)</text>
    <text x="60" y="22" font-size="14" fill="#666">Face details vanish below ~24px; that's fine — the silhouette still reads as headphones.</text>

    <!-- Render the same mark at 200, 96, 48, 32, 24, 16 px -->
    <!-- 200px -->
    <g transform="translate(60, 60)">
      <rect width="200" height="200" rx="16" fill="#ffffff" stroke="#0a0a0a" stroke-opacity="0.08"/>
      <g transform="translate(30, 50) scale(1.4)">
        <path d="M 16 52 Q 50 10, 84 52" fill="none" stroke="#0d7a6e" stroke-width="6.5" stroke-linecap="round"/>
        <circle cx="16" cy="60" r="13" fill="#0d7a6e"/>
        <circle cx="84" cy="60" r="13" fill="#0d7a6e"/>
        <circle cx="40" cy="58" r="5" fill="#ff7a59"/>
        <path d="M 54 60 Q 60 52, 66 60" fill="none" stroke="#ff7a59" stroke-width="3.5" stroke-linecap="round"/>
        <path d="M 43 73 Q 50 79, 57 73" fill="none" stroke="#ff7a59" stroke-width="3.5" stroke-linecap="round"/>
      </g>
      <text x="100" y="222" font-size="11" fill="#666" text-anchor="middle">200 px</text>
    </g>

    <!-- 96 -->
    <g transform="translate(290, 60)">
      <rect width="96" height="96" rx="10" fill="#ffffff" stroke="#0a0a0a" stroke-opacity="0.08"/>
      <g transform="translate(8, 18) scale(0.8)">
        <path d="M 16 52 Q 50 10, 84 52" fill="none" stroke="#0d7a6e" stroke-width="6.5" stroke-linecap="round"/>
        <circle cx="16" cy="60" r="13" fill="#0d7a6e"/>
        <circle cx="84" cy="60" r="13" fill="#0d7a6e"/>
        <circle cx="40" cy="58" r="5" fill="#ff7a59"/>
        <path d="M 54 60 Q 60 52, 66 60" fill="none" stroke="#ff7a59" stroke-width="3.5" stroke-linecap="round"/>
        <path d="M 43 73 Q 50 79, 57 73" fill="none" stroke="#ff7a59" stroke-width="3.5" stroke-linecap="round"/>
      </g>
      <text x="48" y="118" font-size="11" fill="#666" text-anchor="middle">96 px</text>
    </g>

    <!-- 48 -->
    <g transform="translate(410, 60)">
      <rect width="48" height="48" rx="6" fill="#ffffff" stroke="#0a0a0a" stroke-opacity="0.08"/>
      <g transform="translate(4, 9) scale(0.4)">
        <path d="M 16 52 Q 50 10, 84 52" fill="none" stroke="#0d7a6e" stroke-width="6.5" stroke-linecap="round"/>
        <circle cx="16" cy="60" r="13" fill="#0d7a6e"/>
        <circle cx="84" cy="60" r="13" fill="#0d7a6e"/>
        <circle cx="40" cy="58" r="5" fill="#ff7a59"/>
        <path d="M 54 60 Q 60 52, 66 60" fill="none" stroke="#ff7a59" stroke-width="3.5" stroke-linecap="round"/>
        <path d="M 43 73 Q 50 79, 57 73" fill="none" stroke="#ff7a59" stroke-width="3.5" stroke-linecap="round"/>
      </g>
      <text x="24" y="70" font-size="11" fill="#666" text-anchor="middle">48 px</text>
    </g>

    <!-- 32 -->
    <g transform="translate(486, 60)">
      <rect width="32" height="32" rx="4" fill="#ffffff" stroke="#0a0a0a" stroke-opacity="0.08"/>
      <g transform="translate(2, 6) scale(0.28)">
        <path d="M 16 52 Q 50 10, 84 52" fill="none" stroke="#0d7a6e" stroke-width="6.5" stroke-linecap="round"/>
        <circle cx="16" cy="60" r="13" fill="#0d7a6e"/>
        <circle cx="84" cy="60" r="13" fill="#0d7a6e"/>
        <circle cx="40" cy="58" r="5" fill="#ff7a59"/>
        <path d="M 54 60 Q 60 52, 66 60" fill="none" stroke="#ff7a59" stroke-width="3.5" stroke-linecap="round"/>
        <path d="M 43 73 Q 50 79, 57 73" fill="none" stroke="#ff7a59" stroke-width="3.5" stroke-linecap="round"/>
      </g>
      <text x="16" y="54" font-size="11" fill="#666" text-anchor="middle">32 px</text>
    </g>

    <!-- 24 -->
    <g transform="translate(546, 60)">
      <rect width="24" height="24" rx="3" fill="#ffffff" stroke="#0a0a0a" stroke-opacity="0.08"/>
      <g transform="translate(2, 5) scale(0.2)">
        <path d="M 16 52 Q 50 10, 84 52" fill="none" stroke="#0d7a6e" stroke-width="6.5" stroke-linecap="round"/>
        <circle cx="16" cy="60" r="13" fill="#0d7a6e"/>
        <circle cx="84" cy="60" r="13" fill="#0d7a6e"/>
        <circle cx="40" cy="58" r="5" fill="#ff7a59"/>
        <path d="M 54 60 Q 60 52, 66 60" fill="none" stroke="#ff7a59" stroke-width="3.5" stroke-linecap="round"/>
        <path d="M 43 73 Q 50 79, 57 73" fill="none" stroke="#ff7a59" stroke-width="3.5" stroke-linecap="round"/>
      </g>
      <text x="12" y="46" font-size="11" fill="#666" text-anchor="middle">24 px</text>
    </g>

    <!-- 16 (simplified — face disappears, only silhouette remains) -->
    <g transform="translate(600, 60)">
      <rect width="16" height="16" rx="2" fill="#ffffff" stroke="#0a0a0a" stroke-opacity="0.08"/>
      <g transform="translate(1.5, 4) scale(0.13)">
        <path d="M 16 52 Q 50 10, 84 52" fill="none" stroke="#0d7a6e" stroke-width="9" stroke-linecap="round"/>
        <circle cx="16" cy="60" r="16" fill="#0d7a6e"/>
        <circle cx="84" cy="60" r="16" fill="#0d7a6e"/>
      </g>
      <text x="8" y="38" font-size="11" fill="#666" text-anchor="middle">16 px*</text>
    </g>

    <text x="60" y="305" font-size="12" fill="#999">* 16 px uses a simplified glyph (no face, thicker strokes) so it survives favicon scaling.</text>
  </g>

  <!-- =========================================================
       LOCKUP (default = option A: small smile)
       ========================================================= -->
  <g transform="translate(0, 1240)">
    <text x="60" y="0" font-size="11" font-weight="700" fill="#999" letter-spacing="0.16em">LOCKUP</text>

    <rect x="60" y="20" width="880" height="180" rx="20" fill="#ffffff" stroke="#0a0a0a" stroke-opacity="0.08"/>
    <g transform="translate(110, 60) scale(1.0)">
      <path d="M 16 52 Q 50 10, 84 52" fill="none" stroke="#0d7a6e" stroke-width="6.5" stroke-linecap="round"/>
      <circle cx="16" cy="60" r="13" fill="#0d7a6e"/>
      <circle cx="84" cy="60" r="13" fill="#0d7a6e"/>
      <circle cx="40" cy="58" r="5" fill="#ff7a59"/>
      <path d="M 54 60 Q 60 52, 66 60" fill="none" stroke="#ff7a59" stroke-width="3.5" stroke-linecap="round"/>
      <path d="M 43 73 Q 50 79, 57 73" fill="none" stroke="#ff7a59" stroke-width="3.5" stroke-linecap="round"/>
    </g>
    <text x="240" y="146" font-size="78" font-weight="700" fill="#0a0a0a" letter-spacing="-0.03em">lurar</text>
    <text x="500" y="115" font-size="14" fill="#666">audio that knows when you're listening</text>
    <text x="500" y="135" font-size="12" fill="#999" font-style="italic">(placeholder tagline — strike or replace)</text>
  </g>
</svg>
