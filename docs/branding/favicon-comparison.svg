<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Helvetica, Arial, sans-serif">
  <rect width="1100" height="720" fill="#fafafa"/>

  <text x="60" y="60" font-size="28" font-weight="700" fill="#0a0a0a" letter-spacing="-0.02em">Favicon — face vs silhouette</text>
  <text x="60" y="86" font-size="14" fill="#666">Same SVG rendered at typical favicon target sizes. Top row keeps the face; bottom row drops it. The shipped favicon does the top row at ≥ 28 px and the bottom row below — automatically, via a CSS media query inside the SVG.</text>
  <line x1="60" y1="108" x2="1040" y2="108" stroke="#0a0a0a" stroke-opacity="0.08"/>

  <!-- Size labels -->
  <g font-size="11" fill="#999" letter-spacing="0.08em" text-anchor="middle">
    <text x="100" y="148">16 px</text>
    <text x="190" y="148">24 px</text>
    <text x="290" y="148">32 px</text>
    <text x="410" y="148">48 px</text>
    <text x="550" y="148">64 px</text>
    <text x="720" y="148">96 px</text>
    <text x="930" y="148">180 px</text>
  </g>
  <g font-size="10" fill="#bbb" letter-spacing="0.04em" text-anchor="middle">
    <text x="100" y="162">low-DPI tab</text>
    <text x="190" y="162">windows</text>
    <text x="290" y="162">retina tab</text>
    <text x="410" y="162">taskbar</text>
    <text x="550" y="162">bookmark</text>
    <text x="720" y="162">tile</text>
    <text x="930" y="162">apple-touch</text>
