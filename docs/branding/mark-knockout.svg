<!-- Lurar mark — knockout (white-on-color).
     Use on dark photography, brand-color fills, or any context where the color mark would lose contrast. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g fill="#fafafa" stroke="#fafafa">
    <path d="M 16 52 Q 50 10, 84 52" fill="none" stroke-width="6.5" stroke-linecap="round"/>
    <circle cx="16" cy="60" r="13" stroke="none"/>
    <circle cx="84" cy="60" r="13" stroke="none"/>
    <circle cx="40" cy="58" r="5"  stroke="none"/>
    <path d="M 54 60 Q 60 52, 66 60" fill="none" stroke-width="5" stroke-linecap="round"/>
    <path d="M 43 75 Q 50 77, 57 70" fill="none" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
